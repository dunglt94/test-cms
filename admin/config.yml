backend:
  name: github
  repo: dunglt94/test-cms
  # auth_type: pkce
  # app_id: YOUR_GITLAB_APPLICATION_ID
  branch: main
  base_url: https://api.github.com
  # auth_type: implicit

# Cấu hình chung cho việc lưu trữ hình ảnh
media_folder: /public/uploads
public_folder: /uploads

# media_library:
#   name: ""

collections:
  # ==========================================
  # 1. TIẾNG ANH (EN)
  # ==========================================
  - name: "en-posts"
    label: "EN - Posts"
    folder: "content/en" # Đường dẫn thư mục lưu file .md của bài viết EN Blog
    create: true
    sortable_fields:
      fields: ["date", "time", "title"]
      default:
        field: date
        direction: descending
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{time}} - {{title}}"
    fields:
      &blog_fields # Dùng anchor để tái sử dụng các fields bên dưới cho nhanh
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "time", widget: "datetime" }
      - { label: "Reading Time", name: "readingTime", widget: "string" }
      - { label: "Meta Description", name: "metaDescription", widget: "text" }
      - { label: "Thumbnail Square", name: "image", widget: "image" }
      - {
          label: "Thumbnail Landscape",
          name: "thumbnailImage",
          widget: "image",
        }
      - { label: "URL Slug", name: "url", widget: "string" }
      - {
          label: "Type",
          name: "type",
          widget: "select",
          options: ["Blog", "News"],
        }
      - {
          label: "Tags",
          name: "tags",
          widget: "select",
          multiple: true,
          options:
            [
              "Artificial Intelligence",
              "Salesforce Consulting",
              "UI UX Design",
              "Frontend Development",
              "Technology",
              "SAAS",
              "Mobile App Development",
              "QA and Testing",
              "Emerging Technologies",
              "Data Analytics",
              "Hypothesis Testing",
              "CRM and ERP Platform",
            ],
        }
      - { label: "Content", name: "body", widget: "markdown" }

  # ==========================================
  # 2. TIẾNG HÀN (KO)
  # ==========================================
  - name: "ko-post"
    label: "KO - Post"
    folder: "content/ko"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields: *blog_fields
